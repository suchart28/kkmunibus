<script type="module">
    // ... (ส่วนโค้ดเดิมด้านบนเหมือนเดิม) ...

    onSnapshot(q, (snapshot) => {
        const listDiv = document.getElementById('bookingList');
        listDiv.innerHTML = '';
        
        snapshot.forEach((firestoreDoc) => {
            const data = firestoreDoc.data();
            const docId = firestoreDoc.id; 
            const item = document.createElement('div');
            item.className = 'booking-item';
            
            const timeText = data.time || "ไม่ระบุ";
            const passengerText = data.passengers || "1"; // ดึงข้อมูลจำนวนคน
            const detailsText = data.details && data.details !== "-" ? data.details : "ไม่มี";
            
            item.innerHTML = `
                <div style="margin-bottom: 8px; font-size: 15px; border-bottom: 1px dashed #ddd; padding-bottom: 5px;">
                    📅 <strong style="color:var(--primary);">${data.date}</strong> | ⏰ <strong style="color:#e74c3c;">${timeText} น.</strong>
                </div>
                <div style="margin-bottom: 3px; font-size: 15px;">👤 <strong>ชื่อ:</strong> ${data.name}</div>
                <div style="margin-bottom: 3px; font-size: 15px;">📞 <strong>โทร:</strong> ${data.phone}</div>
                <div style="margin-bottom: 5px; font-size: 15px;">👥 <strong>จำนวนผู้โดยสาร:</strong> <span style="color:#27ae60; font-weight:bold;">${passengerText} คน</span></div>
                
                <div style="background: #f8f9fa; padding: 8px; border-radius: 8px; margin-bottom: 8px; font-size: 14px;">
                    📝 <strong>รายละเอียดเพิ่มเติม:</strong><br> <span style="color: #555;">${detailsText}</span>
                </div>

                <div style="font-size: 14px; color: #34495e; margin-bottom: 3px;">📍 <strong>จุดรับ:</strong> ${data.pickup.name}</div>
                <div style="font-size: 14px; color: #34495e; margin-bottom: 10px;">🏁 <strong>จุดส่ง:</strong> ${data.destination.name}</div>
                
                <div style="display: flex; gap: 10px;">
                    <button onclick="window.drawRoute(${data.pickup.lat}, ${data.pickup.lng}, ${data.destination.lat}, ${data.destination.lng})" style="flex: 2; padding: 10px; font-size: 14px; background-color: #3498db;">📍 ดูเส้นทาง</button>
                    <button onclick="window.deleteBooking('${docId}')" style="flex: 1; padding: 10px; font-size: 14px; background-color: #e74c3c;">🗑️ ลบ</button>
                </div>
            `;
            listDiv.appendChild(item);
        });
    });
</script>

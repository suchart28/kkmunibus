<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin - ระบบจองรถ</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet-routing-machine@latest/dist/leaflet-routing-machine.css" />
</head>
<body>
    <div class="admin-container">
        <h1>🛠 แผงควบคุมรถสองแถว (Admin Dashboard)</h1>
        
        <div class="admin-layout">
            <div class="map-section">
                <div id="map"></div>
            </div>
            
            <div class="list-section">
                <div id="bookingList" class="card">กำลังโหลดข้อมูลการจอง...</div>
            </div>
        </div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://unpkg.com/leaflet-routing-machine@latest/dist/leaflet-routing-machine.js"></script>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, onSnapshot, query, orderBy } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDMMwciq6QoLSaWK6xfdr0U3ynyahtoaSk",
            authDomain: "studio-a33fe.firebaseapp.com",
            databaseURL: "https://studio-a33fe-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "studio-a33fe",
            storageBucket: "studio-a33fe.firebasestorage.app",
            messagingSenderId: "753539109404",
            appId: "1:753539109404:web:935800b0d97af25de645d9",
            measurementId: "G-HG6VSPKCVK"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        
        const map = L.map('map').setView([16.4322, 102.8236], 13);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', { attribution: '© OpenStreetMap' }).addTo(map);
        
        let routingControl = null;

        const q = query(collection(db, "bookings"), orderBy("date", "asc"));
        
        onSnapshot(q, (snapshot) => {
            const listDiv = document.getElementById('bookingList');
            listDiv.innerHTML = '';
            
            if (snapshot.empty) {
                listDiv.innerHTML = '<p style="text-align:center; padding: 20px;">ไม่มีรายการจองในระบบ</p>';
                return;
            }

            snapshot.forEach((doc) => {
                const data = doc.data();
                const item = document.createElement('div');
                item.className = 'booking-item';
                
                // ตรวจสอบว่ามีข้อมูลเวลาหรือไม่ (เผื่อข้อมูลเก่าที่จองไปแล้วก่อนอัปเดต)
                const timeText = data.time ? data.time : "ไม่ระบุ";

                // เพิ่มเวลาต่อท้ายวันที่
                item.innerHTML = `
                    <div style="margin-bottom: 5px; font-size: 16px;">
                        📅 <strong style="color:var(--primary);">${data.date}</strong> | ⏰ เวลา: <strong style="color:#e74c3c;">${timeText} น.</strong>
                    </div>
                    <div>👤 <strong>ชื่อ:</strong> ${data.name}</div>
                    <div>📞 <strong>โทร:</strong> ${data.phone}</div>
                    <button onclick="window.drawRoute(${data.pickup.lat}, ${data.pickup.lng}, ${data.destination.lat}, ${data.destination.lng})" style="padding: 10px; font-size: 16px; margin-top: 10px; background-color: #3498db;">📍 ดูเส้นทางบนแผนที่</button>
                `;
                listDiv.appendChild(item);
            });
            
            setTimeout(() => { map.invalidateSize(); }, 300);
        });

        window.drawRoute = (plat, plng, dlat, dlng) => {
            if (routingControl) map.removeControl(routingControl);
            
            routingControl = L.Routing.control({
                waypoints: [ L.latLng(plat, plng), L.latLng(dlat, dlng) ],
                router: L.Routing.osrmv1({ serviceUrl: 'https://router.project-osrm.org/route/v1' }),
                lineOptions: { styles: [{ color: '#f39c12', opacity: 0.8, weight: 6 }] },
                addWaypoints: false,
                routeWhileDragging: false,
                fitSelectedRoutes: true,
                showAlternatives: false,
                containerClassName: 'routing-ui'
            }).addTo(map);
            
            if (window.innerWidth < 768) {
                window.scrollTo({ top: 0, behavior: 'smooth' });
            }
        };
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin - แผงควบคุมรถสองแถว</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet-routing-machine@latest/dist/leaflet-routing-machine.css" />
</head>
<body>
    <div class="admin-container">
        <h1>🛠 แผงควบคุมรถสองแถว (Admin Dashboard)</h1>
        
        <div class="admin-layout">
            <div class="map-section">
                <div id="map"></div>
            </div>
            
            <div class="list-section">
                <div id="bookingList" class="card">กำลังโหลดข้อมูลการจอง...</div>
            </div>
        </div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://unpkg.com/leaflet-routing-machine@latest/dist/leaflet-routing-machine.js"></script>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        // เพิ่ม doc และ deleteDoc สำหรับฟังก์ชันลบข้อมูล
        import { getFirestore, collection, onSnapshot, query, orderBy, doc, deleteDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDMMwciq6QoLSaWK6xfdr0U3ynyahtoaSk",
            authDomain: "studio-a33fe.firebaseapp.com",
            databaseURL: "https://studio-a33fe-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "studio-a33fe",
            storageBucket: "studio-a33fe.firebasestorage.app",
            messagingSenderId: "753539109404",
            appId: "1:753539109404:web:935800b0d97af25de645d9",
            measurementId: "G-HG6VSPKCVK"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        
        const map = L.map('map').setView([16.4322, 102.8236], 13);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', { attribution: '© OpenStreetMap' }).addTo(map);
        
        let routingControl = null;

        const q = query(collection(db, "bookings"), orderBy("date", "asc"));
        
        // โหลดข้อมูลแบบ Real-time
        onSnapshot(q, (snapshot) => {
            const listDiv = document.getElementById('bookingList');
            listDiv.innerHTML = '';
            
            if (snapshot.empty) {
                listDiv.innerHTML = '<p style="text-align:center; padding: 20px;">ไม่มีรายการจองในระบบ</p>';
                return;
            }

            snapshot.forEach((firestoreDoc) => {
                const data = firestoreDoc.data();
                const docId = firestoreDoc.id; // เก็บ ID ของเอกสารเพื่อใช้ลบ
                const item = document.createElement('div');
                item.className = 'booking-item';
                
                const timeText = data.time ? data.time : "ไม่ระบุ";

                item.innerHTML = `
                    <div style="margin-bottom: 8px; font-size: 16px; border-bottom: 1px dashed #ddd; padding-bottom: 5px;">
                        📅 <strong>${data.date}</strong> | ⏰ เวลา: <strong style="color:#e74c3c;">${timeText} น.</strong>
                    </div>
                    <div style="margin-bottom: 5px;">👤 <strong>ชื่อ:</strong> ${data.name}</div>
                    <div style="margin-bottom: 5px;">📞 <strong>โทร:</strong> ${data.phone}</div>
                    <div style="font-size: 14px; color: #555; margin-bottom: 3px;">📍 <strong>พิกัดจุดรับ:</strong> ${data.pickup.lat.toFixed(4)}, ${data.pickup.lng.toFixed(4)}</div>
                    <div style="font-size: 14px; color: #555; margin-bottom: 10px;">🏁 <strong>พิกัดจุดส่ง:</strong> ${data.destination.lat.toFixed(4)}, ${data.destination.lng.toFixed(4)}</div>
                    
                    <div style="display: flex; gap: 10px;">
                        <button onclick="window.drawRoute(${data.pickup.lat}, ${data.pickup.lng}, ${data.destination.lat}, ${data.destination.lng})" style="flex: 2; padding: 10px; font-size: 14px; background-color: #3498db;">📍 ดูเส้นทาง</button>
                        <button onclick="window.deleteBooking('${docId}')" style="flex: 1; padding: 10px; font-size: 14px; background-color: #e74c3c;">🗑️ ลบ</button>
                    </div>
                `;
                listDiv.appendChild(item);
            });
            
            setTimeout(() => { map.invalidateSize(); }, 300);
        });

        // ฟังก์ชันวาดเส้นทาง
        window.drawRoute = (plat, plng, dlat, dlng) => {
            if (routingControl) map.removeControl(routingControl);
            
            routingControl = L.Routing.control({
                waypoints: [ L.latLng(plat, plng), L.latLng(dlat, dlng) ],
                router: L.Routing.osrmv1({ serviceUrl: 'https://router.project-osrm.org/route/v1' }),
                lineOptions: { styles: [{ color: '#f39c12', opacity: 0.8, weight: 6 }] },
                addWaypoints: false,
                routeWhileDragging: false,
                fitSelectedRoutes: true,
                showAlternatives: false,
                containerClassName: 'routing-ui'
            }).addTo(map);
            
            if (window.innerWidth < 992) {
                window.scrollTo({ top: 0, behavior: 'smooth' });
            }
        };

        // ฟังก์ชันลบข้อมูล
        window.deleteBooking = async (id) => {
            // เด้งหน้าต่างยืนยันก่อนลบ
            if (confirm("คุณแน่ใจหรือไม่ว่าต้องการ 'ลบ' รายการจองนี้?")) {
                try {
                    await deleteDoc(doc(db, "bookings", id));
                    // ไม่ต้องเขียนโค้ดรีเฟรชหน้า เพราะ onSnapshot จะโหลดข้อมูลใหม่ให้อัตโนมัติเมื่อข้อมูลถูกลบ
                    if (routingControl) {
                        map.removeControl(routingControl); // เคลียร์เส้นทางบนแผนที่ออก
                        routingControl = null;
                    }
                } catch (error) {
                    alert("เกิดข้อผิดพลาดในการลบข้อมูล: " + error.message);
                    console.error(error);
                }
            }
        };
    </script>
</body>
</html>

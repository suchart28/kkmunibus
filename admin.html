<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin - แผงควบคุมรถสองแถว</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet-routing-machine@latest/dist/leaflet-routing-machine.css" />
    
    <style>
        @media print {
            body > *:not(#printArea) { display: none !important; }
            #printArea { display: block !important; width: 100%; margin: 0; padding: 0; }
            @page { size: A4 portrait; margin: 10mm; }
            .print-page { 
                width: 100%; 
                height: 277mm; 
                page-break-after: always; 
                display: flex;
                flex-direction: column;
                font-family: 'Sarabun', 'Chakra Petch', sans-serif;
            }
            .print-page:last-child { page-break-after: auto; }
            .print-header { text-align: center; font-size: 18px; font-weight: bold; margin-bottom: 10px; color: black; }
            .print-table { width: 100%; border-collapse: collapse; flex-grow: 1; display: table; table-layout: fixed; }
            .print-table th, .print-table td { 
                border: 1px solid #000; 
                padding: 4px; 
                font-size: 13px; 
                vertical-align: middle;
                color: black;
                word-wrap: break-word;
            }
            .print-table th { background-color: #e0e0e0 !important; -webkit-print-color-adjust: exact; text-align: center; font-size: 14px;}
            /* ปรับความสูงแถวให้พอดีกับหน้ากระดาษ A4 (5 คิวต่อหน้า) */
            .print-table tr.item-row { height: 45mm; } 
        }
    </style>
</head>
<body>
    <div id="printArea" style="display: none;"></div>

    <div class="admin-container">
        <h1>🛠 แผงควบคุมรถสองแถว (Admin Dashboard)</h1>
        
        <div style="display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; margin-bottom: 15px;">
            <div style="font-size: 14px; color: #555;">ระบบจัดการคิวรถสองแถวแบบ Real-time</div>
            <button onclick="window.printQueue()" style="padding: 10px 20px; font-size: 16px; background-color: #8e44ad; color: white; border: none; border-radius: 8px; cursor: pointer; display: flex; align-items: center; gap: 8px; font-weight: 600;">
                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <polyline points="6 9 6 2 18 2 18 9"></polyline>
                    <path d="M6 18H4a2 2 0 0 1-2-2v-5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v5a2 2 0 0 1-2 2h-2"></path>
                    <rect x="6" y="14" width="12" height="8"></rect>
                </svg>
                พิมพ์คิวงาน (A4)
            </button>
        </div>

        <div class="dashboard-stats" style="display: flex; gap: 10px; margin-bottom: 20px; flex-wrap: wrap;">
            <div class="card" style="flex: 1; text-align: center; background: #34495e; color: white; padding: 15px; margin-bottom: 0; min-width: 120px;">
                <h3 style="margin: 0 0 10px 0; font-size: 14px;">📅 จองทั้งหมด</h3>
                <h2 id="totalMonth" style="margin: 0; font-size: 24px;">0</h2>
            </div>
            <div class="card" style="flex: 1; text-align: center; background: #27ae60; color: white; padding: 15px; margin-bottom: 0; min-width: 120px;">
                <h3 style="margin: 0 0 10px 0; font-size: 14px;">✅ สำเร็จ</h3>
                <h2 id="completedMonth" style="margin: 0; font-size: 24px;">0</h2>
            </div>
            <div class="card" style="flex: 1; text-align: center; background: #e74c3c; color: white; padding: 15px; margin-bottom: 0; min-width: 120px;">
                <h3 style="margin: 0 0 10px 0; font-size: 14px;">❌ ไม่สำเร็จ</h3>
                <h2 id="failedMonth" style="margin: 0; font-size: 24px;">0</h2>
            </div>
        </div>
        
        <div class="admin-layout">
            <div class="map-section">
                <div id="map"></div>
            </div>
            
            <div class="list-section">
                <div id="bookingList" class="card">กำลังโหลดข้อมูลการจอง...</div>
            </div>
        </div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://unpkg.com/leaflet-routing-machine@latest/dist/leaflet-routing-machine.js"></script>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, onSnapshot, query, orderBy, doc, deleteDoc, updateDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDMMwciq6QoLSaWK6xfdr0U3ynyahtoaSk",
            authDomain: "studio-a33fe.firebaseapp.com",
            databaseURL: "https://studio-a33fe-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "studio-a33fe",
            storageBucket: "studio-a33fe.firebasestorage.app",
            messagingSenderId: "753539109404",
            appId: "1:753539109404:web:935800b0d97af25de645d9",
            measurementId: "G-HG6VSPKCVK"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        
        const map = L.map('map').setView([16.4322, 102.8236], 13);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', { attribution: '© OpenStreetMap' }).addTo(map);
        
        let routingControl = null;
        window.pendingJobsToPrint = [];

        const q = query(collection(db, "bookings"), orderBy("date", "asc"));
        
        onSnapshot(q, (snapshot) => {
            const listDiv = document.getElementById('bookingList');
            listDiv.innerHTML = '';
            window.pendingJobsToPrint = []; 
            
            let statTotal = 0;
            let statCompleted = 0;
            let statFailed = 0;
            const currentMonth = new Date().getMonth();
            const currentYear = new Date().getFullYear();
            let hasPendingJobs = false;

            snapshot.forEach((firestoreDoc) => {
                const data = firestoreDoc.data();
                const docId = firestoreDoc.id; 
                
                let docDate = data.timestamp ? data.timestamp.toDate() : new Date();
                if (docDate.getMonth() === currentMonth && docDate.getFullYear() === currentYear) {
                    statTotal++;
                    if (data.status === 'completed') statCompleted++;
                    if (data.status === 'failed') statFailed++;
                }

                if (data.status === 'completed' || data.status === 'failed') return;

                window.pendingJobsToPrint.push(data);

                hasPendingJobs = true;
                const item = document.createElement('div');
                item.className = 'booking-item';
                
                const timeText = data.time || "ไม่ระบุ";
                const detailsText = data.details && data.details !== "-" ? data.details : "ไม่มี";
                const pickupName = data.pickup.name || "พิกัดจุดรับ";
                const destName = data.destination.name || "พิกัดจุดส่ง";

                item.innerHTML = `
                    <div style="margin-bottom: 8px; font-size: 15px; border-bottom: 1px dashed #ddd; padding-bottom: 5px;">
                        📅 <strong style="color:var(--primary);">${data.date}</strong> | ⏰ เวลา: <strong style="color:#e74c3c;">${timeText} น.</strong>
                    </div>
                    <div style="margin-bottom: 3px; font-size: 15px;">👤 <strong>ชื่อ:</strong> ${data.name}</div>
                    <div style="margin-bottom: 3px; font-size: 15px;">📞 <strong>โทร:</strong> ${data.phone}</div>
                    <div style="margin-bottom: 5px; font-size: 15px;">👥 <strong>จำนวนผู้โดยสาร:</strong> <span style="color:#27ae60; font-weight:bold;">${data.passengers || 'ไม่ระบุ'}</span> คน</div>
                    
                    <div style="background: #f8f9fa; padding: 8px; border-radius: 8px; margin-bottom: 8px; font-size: 14px;">
                        📝 <strong>รายละเอียดเพิ่มเติม:</strong><br> <span style="color: #555;">${detailsText}</span>
                    </div>

                    <div style="font-size: 14px; color: #34495e; margin-bottom: 3px;">📍 <strong>จุดรับ:</strong> ${pickupName}</div>
                    <div style="font-size: 14px; color: #34495e; margin-bottom: 10px;">🏁 <strong>จุดส่ง:</strong> ${destName}</div>
                    
                    <div style="display: flex; gap: 5px; flex-wrap: wrap;">
                        <button onclick="window.drawRoute(${data.pickup.lat}, ${data.pickup.lng}, ${data.destination.lat}, ${data.destination.lng})" style="flex: 1; min-width: 70px; padding: 8px; font-size: 12px; background-color: #3498db;">📍 เส้นทาง</button>
                        <button onclick="window.completeJob('${docId}')" style="flex: 1; min-width: 70px; padding: 8px; font-size: 12px; background-color: #27ae60;">✅ สำเร็จ</button>
                        <button onclick="window.failedJob('${docId}')" style="flex: 1; min-width: 70px; padding: 8px; font-size: 12px; background-color: #e67e22;">❌ ไม่สำเร็จ</button>
                        <button onclick="window.deleteBooking('${docId}')" style="flex: 1; min-width: 70px; padding: 8px; font-size: 12px; background-color: #e74c3c;">🗑️ ลบ</button>
                    </div>
                `;
                listDiv.appendChild(item);
            });

            document.getElementById('totalMonth').innerText = statTotal;
            document.getElementById('completedMonth').innerText = statCompleted;
            document.getElementById('failedMonth').innerText = statFailed;
            
            if (!hasPendingJobs) {
                listDiv.innerHTML = '<p style="text-align:center; padding: 20px;">🎉 ไม่มีคิวรอดำเนินการ</p>';
            }
            
            setTimeout(() => { map.invalidateSize(); }, 300);
        });

        window.printQueue = () => {
            if (!window.pendingJobsToPrint || window.pendingJobsToPrint.length === 0) {
                alert("ไม่มีคิวงานรอดำเนินการให้พิมพ์ครับ");
                return;
            }

            const printArea = document.getElementById('printArea');
            printArea.innerHTML = ''; 
            
            const itemsPerPage = 5; 
            const totalPages = Math.ceil(window.pendingJobsToPrint.length / itemsPerPage);
            
            for (let i = 0; i < totalPages; i++) {
                const pageItems = window.pendingJobsToPrint.slice(i * itemsPerPage, (i + 1) * itemsPerPage);
                const pageDiv = document.createElement('div');
                pageDiv.className = 'print-page';
                
                let rowsHtml = '';
                
                pageItems.forEach((job, index) => {
                    const rowNum = (i * itemsPerPage) + index + 1;
                    
                    // อัปเดต URL เป็นรูปแบบ Google Maps Directions API
                    // ไม่ต้องใส่ origin ระบบจะดึงตำแหน่ง GPS ปัจจุบันของผู้ใช้งาน
                    // waypoints = จุดรับผู้โดยสาร
                    // destination = จุดส่งปลายทาง
                    const mapsUrl = `https://www.google.com/maps/dir/?api=1&destination=${job.destination.lat},${job.destination.lng}&waypoints=${job.pickup.lat},${job.pickup.lng}&travelmode=driving`;
                    
                    // สร้าง QR Code ขนาด 200x200 ให้ชัดเจน
                    const qrCodeUrl = `https://api.qrserver.com/v1/create-qr-code/?size=200x200&data=${encodeURIComponent(mapsUrl)}`;

                    rowsHtml += `
                        <tr class="item-row">
                            <td style="text-align:center;">${rowNum}</td>
                            <td style="text-align:center;">${job.date}<br><strong style="font-size: 15px;">${job.time || '-'} น.</strong></td>
                            <td>
                                <strong>${job.name}</strong><br>
                                <span style="font-size: 11px;">📞 ${job.phone}</span><br>
                                <span style="font-size: 11px; color:#27ae60;">👥 ${job.passengers || '-'} คน</span>
                            </td>
                            <td>
                                <strong>${job.pickup.name || 'พิกัดจุดรับ'}</strong><br>
                                <span style="font-size: 10px; color: #555;">(Lat: ${job.pickup.lat.toFixed(5)}, Lng: ${job.pickup.lng.toFixed(5)})</span>
                            </td>
                            <td>
                                <strong>${job.destination.name || 'พิกัดจุดส่ง'}</strong><br>
                                <span style="font-size: 10px; color: #555;">(Lat: ${job.destination.lat.toFixed(5)}, Lng: ${job.destination.lng.toFixed(5)})</span>
                            </td>
                            <td style="text-align:center; padding: 6px;">
                                <img src="${qrCodeUrl}" alt="QR" style="width: 90%; max-width: 150px; height: auto; display:block; margin: 0 auto;">
                                <div style="font-size: 11px; color:#888; margin-top: 4px;">สแกนนำทาง<br>(เริ่มที่ปัจจุบัน)</div>
                            </td>
                        </tr>
                    `;
                });
                
                const emptyRowsNeeded = itemsPerPage - pageItems.length;
                for (let e = 0; e < emptyRowsNeeded; e++) {
                     rowsHtml += `<tr class="item-row"><td></td><td></td><td></td><td></td><td></td><td></td></tr>`;
                }
                
                pageDiv.innerHTML = `
                    <div class="print-header">📄 รายการคิวจองรถสองแถวรอดำเนินการ (หน้า ${i + 1}/${totalPages})</div>
                    <table class="print-table">
                        <thead>
                            <tr>
                                <th style="width: 3%;">คิว</th>
                                <th style="width: 12%;">วัน / เวลา</th>
                                <th style="width: 18%;">ข้อมูลผู้จอง</th>
                                <th style="width: 23%;">📍 จุดรับ</th>
                                <th style="width: 23%;">🏁 จุดส่ง</th>
                                <th style="width: 21%;">🗺️ สแกนนำทาง</th>
                            </tr>
                        </thead>
                        <tbody>
                            ${rowsHtml}
                        </tbody>
                    </table>
                `;
                printArea.appendChild(pageDiv);
            }
            
            setTimeout(() => {
                window.print();
            }, 800); 
        };

        window.drawRoute = (plat, plng, dlat, dlng) => {
            if (routingControl) map.removeControl(routingControl);
            routingControl = L.Routing.control({
                waypoints: [ L.latLng(plat, plng), L.latLng(dlat, dlng) ],
                router: L.Routing.osrmv1({ serviceUrl: 'https://router.project-osrm.org/route/v1' }),
                lineOptions: { styles: [{ color: '#f39c12', opacity: 0.8, weight: 6 }] },
                addWaypoints: false,
                routeWhileDragging: false,
                fitSelectedRoutes: true,
                showAlternatives: false,
                containerClassName: 'routing-ui'
            }).addTo(map);
            if (window.innerWidth < 1024) window.scrollTo({ top: 0, behavior: 'smooth' });
        };

        window.completeJob = async (id) => {
            if (confirm("ยืนยันว่าให้บริการ 'สำเร็จ' แล้วใช่หรือไม่?")) {
                try {
                    await updateDoc(doc(db, "bookings", id), { status: "completed", completedAt: new Date() });
                    if (routingControl) { map.removeControl(routingControl); routingControl = null; }
                } catch (error) { alert("เกิดข้อผิดพลาด: " + error.message); }
            }
        };

        window.failedJob = async (id) => {
            const reason = prompt("กรุณาระบุสาเหตุที่ไม่สำเร็จ:");
            if (reason === null) return; 
            if (reason.trim() === "") { alert("กรุณาระบุสาเหตุด้วยครับ"); return; }
            try {
                await updateDoc(doc(db, "bookings", id), { status: "failed", failureReason: reason, failedAt: new Date() });
                if (routingControl) { map.removeControl(routingControl); routingControl = null; }
            } catch (error) { alert("เกิดข้อผิดพลาด: " + error.message); }
        };

        window.deleteBooking = async (id) => {
            if (confirm("คุณแน่ใจหรือไม่ว่าต้องการ 'ลบ' รายการจองนี้?")) {
                try {
                    await deleteDoc(doc(db, "bookings", id));
                    if (routingControl) { map.removeControl(routingControl); routingControl = null; }
                } catch (error) { alert("เกิดข้อผิดพลาดในการลบ: " + error.message); }
            }
        };
    </script>
</body>
</html>

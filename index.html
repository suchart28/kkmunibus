<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>จองคิวใช้งานรถสองแถว เทศบาลนครขอนแก่น</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
</head>
<body>
    <div class="mobile-container">
        <h1>🚍 จองคิวใช้งานรถสองแถว เทศบาลนครขอนแก่น</h1>
        <div id="status" class="status-badge">📍 กรุณาปักหมุดหรือค้นหา</div>
        
        <div class="card" style="margin-bottom: 15px; padding: 15px;">
            <div class="form-group" style="margin-bottom: 10px;">
                <label>📍 จุดรับ</label>
                <div style="display: flex; gap: 5px;">
                    <input type="text" id="pickupSearch" placeholder="พิมพ์ค้นหา หรือจิ้มบนแผนที่..." style="flex: 1;">
                    <button type="button" onclick="getCurrentLocation()" id="btnLocation" style="width: 45px; padding: 10px; font-size: 16px; background-color: #3498db; display: flex; justify-content: center; align-items: center;" title="ตำแหน่งปัจจุบันของฉัน">📍</button>
                    <button type="button" onclick="searchLocation('pickup')" style="width: 70px; padding: 10px; font-size: 15px; background-color: #27ae60;">ค้นหา</button>
                </div>
            </div>
            <div class="form-group" style="margin-bottom: 0;">
                <label>🏁 จุดส่ง</label>
                <div style="display: flex; gap: 5px;">
                    <input type="text" id="destSearch" placeholder="พิมพ์ค้นหา หรือจิ้มบนแผนที่..." style="flex: 1;">
                    <button type="button" onclick="searchLocation('dest')" style="width: 70px; padding: 10px; font-size: 15px; background-color: #e74c3c;">ค้นหา</button>
                </div>
            </div>
        </div>

        <div id="map"></div>

        <div class="card">
            <div class="form-group">
                <label>ชื่อผู้จอง</label>
                <input type="text" id="userName" placeholder="ชื่อ-สกุล">
            </div>
            <div class="form-group">
                <label>เบอร์โทรศัพท์</label>
                <input type="tel" id="userPhone" placeholder="08x-xxxxxxx">
            </div>
            
            <div style="display: flex; flex-wrap: wrap; gap: 10px; margin-bottom: 15px;">
                <div class="form-group" style="flex: 1; min-width: 140px; margin-bottom: 0;">
                    <label>วันเดินทาง</label>
                    <input type="date" id="travelDate">
                </div>
                <div class="form-group" style="flex: 1; min-width: 140px; margin-bottom: 0;">
                    <label>เวลารับ</label>
                    <input type="time" id="travelTime">
                </div>
                <div class="form-group" style="flex: 1; min-width: 140px; margin-bottom: 0;">
                    <label>จำนวนผู้โดยสาร</label>
                    <input type="number" id="passengerCount" min="1" placeholder="ระบุจำนวนคน">
                </div>
            </div>

            <div class="form-group" style="margin-bottom: 20px;">
                <label>รายละเอียดเพิ่มเติม (ถ้ามี)</label>
                <textarea id="bookingDetails" placeholder="เช่น มีสัมภาระขนาดใหญ่, หรือจุดสังเกตเพิ่มเติม..."></textarea>
            </div>
            <button id="btnSubmit">ยืนยันการจอง</button>
        </div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, addDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDMMwciq6QoLSaWK6xfdr0U3ynyahtoaSk",
            authDomain: "studio-a33fe.firebaseapp.com",
            databaseURL: "https://studio-a33fe-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "studio-a33fe",
            storageBucket: "studio-a33fe.firebasestorage.app",
            messagingSenderId: "753539109404",
            appId: "1:753539109404:web:935800b0d97af25de645d9",
            measurementId: "G-HG6VSPKCVK"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // กำหนดวันที่ขั้นต่ำเป็นวันพรุ่งนี้
        const dateInput = document.getElementById('travelDate');
        const tomorrow = new Date();
        tomorrow.setDate(tomorrow.getDate() + 1);
        dateInput.min = tomorrow.toISOString().split('T')[0];

        const map = L.map('map').setView([16.4322, 102.8236], 13);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', { attribution: '© OpenStreetMap' }).addTo(map);

        let pickup = null;
        let destination = null;
        let pickupMarker = null;
        let destMarker = null;

        const greenIcon = L.icon({ iconUrl: 'https://raw.githubusercontent.com/pointhi/leaflet-color-markers/master/img/marker-icon-2x-green.png', iconSize: [25, 41], iconAnchor: [12, 41] });
        const redIcon = L.icon({ iconUrl: 'https://raw.githubusercontent.com/pointhi/leaflet-color-markers/master/img/marker-icon-2x-red.png', iconSize: [25, 41], iconAnchor: [12, 41] });

        function updateStatus() {
            const statusBadge = document.getElementById('status');
            if (pickup && destination) {
                statusBadge.innerText = '✅ ระบุจุดรับ-ส่งครบแล้ว กรุณากรอกข้อมูล';
                statusBadge.style.background = '#27ae60';
            } else if (pickup && !destination) {
                statusBadge.innerText = '📍 กรุณาปักหมุดหรือค้นหา "จุดส่ง" ต่อ';
                statusBadge.style.background = '#e67e22';
            } else {
                statusBadge.innerText = '📍 กรุณาปักหมุดหรือค้นหา';
                statusBadge.style.background = 'var(--secondary)';
            }
        }

        function placeMarker(latlng, type) {
            if (type === 'pickup') {
                if (pickupMarker) map.removeLayer(pickupMarker);
                pickup = latlng;
                pickupMarker = L.marker(pickup, {icon: greenIcon}).addTo(map); 
            } else {
                if (destMarker) map.removeLayer(destMarker);
                destination = latlng;
                destMarker = L.marker(destination, {icon: redIcon}).addTo(map);
            }
            updateStatus();
        }

        map.on('click', async (e) => {
            const isPickup = !pickup;
            const type = isPickup ? 'pickup' : 'dest';
            placeMarker(e.latlng, type);

            try {
                const response = await fetch(`https://nominatim.openstreetmap.org/reverse?format=json&lat=${e.latlng.lat}&lon=${e.latlng.lng}&zoom=18&addressdetails=1`);
                const data = await response.json();
                let placeName = data.name || (data.address ? (data.address.road || data.address.suburb || data.address.village) : null);
                if (!placeName) placeName = data.display_name.split(',').slice(0, 2).join(', ');

                if (isPickup) {
                    document.getElementById('pickupSearch').value = placeName || "พิกัดจุดรับ";
                } else {
                    document.getElementById('destSearch').value = placeName || "พิกัดจุดส่ง";
                }
            } catch (err) { console.log("ไม่สามารถดึงชื่อสถานที่ได้"); }
        });

        // ฟังก์ชันใหม่: ดึงตำแหน่งปัจจุบัน
        window.getCurrentLocation = () => {
            const btn = document.getElementById('btnLocation');
            if (navigator.geolocation) {
                btn.innerText = "⏳"; // เปลี่ยนไอคอนตอนกำลังโหลด
                btn.disabled = true;

                navigator.geolocation.getCurrentPosition(async (position) => {
                    const lat = position.coords.latitude;
                    const lng = position.coords.longitude;
                    const latlng = L.latLng(lat, lng);
                    
                    // เลื่อนแผนที่ไปตำแหน่งปัจจุบันและปักหมุดจุดรับ
                    map.setView(latlng, 16);
                    placeMarker(latlng, 'pickup');

                    // ดึงชื่อสถานที่จากพิกัด
                    try {
                        const response = await fetch(`https://nominatim.openstreetmap.org/reverse?format=json&lat=${lat}&lon=${lng}&zoom=18&addressdetails=1`);
                        const data = await response.json();
                        let placeName = data.name || (data.address ? (data.address.road || data.address.suburb || data.address.village) : null);
                        if (!placeName) placeName = data.display_name.split(',').slice(0, 2).join(', ');
                        
                        document.getElementById('pickupSearch').value = placeName || `พิกัด: ${lat.toFixed(4)}, ${lng.toFixed(4)}`;
                    } catch (err) {
                        document.getElementById('pickupSearch').value = `พิกัด: ${lat.toFixed(4)}, ${lng.toFixed(4)}`;
                    }

                    btn.innerText = "📍"; // คืนค่าปุ่ม
                    btn.disabled = false;
                }, (error) => {
                    alert("ไม่สามารถดึงตำแหน่งปัจจุบันได้ กรุณาเปิด GPS/Location บนอุปกรณ์ของคุณ หรือจิ้มเลือกบนแผนที่ด้วยตนเอง");
                    btn.innerText = "📍";
                    btn.disabled = false;
                }, { enableHighAccuracy: true });
            } else {
                alert("เบราว์เซอร์ของคุณไม่รองรับการดึงตำแหน่งปัจจุบัน");
            }
        };

        window.searchLocation = async function(type) {
            const inputId = type === 'pickup' ? 'pickupSearch' : 'destSearch';
            const query = document.getElementById(inputId).value;
            if (!query) { alert("กรุณาพิมพ์ชื่อสถานที่ก่อนกดค้นหา"); return; }
            try {
                const response = await fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(query + ' ขอนแก่น')}`);
                const data = await response.json();
                if (data && data.length > 0) {
                    const latlng = L.latLng(data[0].lat, data[0].lon);
                    map.setView(latlng, 15);
                    placeMarker(latlng, type);
                    document.getElementById(inputId).value = data[0].name || query; 
                } else {
                    alert('ไม่พบสถานที่นี้ กรุณาลองใหม่');
                }
            } catch (err) { alert('เกิดข้อผิดพลาดในการเชื่อมต่อ'); }
        };

        document.getElementById('btnSubmit').onclick = async () => {
            const name = document.getElementById('userName').value;
            const phone = document.getElementById('userPhone').value;
            const date = document.getElementById('travelDate').value;
            const time = document.getElementById('travelTime').value;
            const passengers = document.getElementById('passengerCount').value; 
            const details = document.getElementById('bookingDetails').value;
            
            const pickupName = document.getElementById('pickupSearch').value || "จุดรับ (ไม่ระบุชื่อ)";
            const destName = document.getElementById('destSearch').value || "จุดส่ง (ไม่ระบุชื่อ)";

            if (!pickup || !destination || !name || !phone || !date || !time || !passengers) {
                alert("กรุณากรอกข้อมูลให้ครบทุกช่อง (รวมถึงจำนวนผู้โดยสาร)");
                return;
            }

            const btn = document.getElementById('btnSubmit');
            btn.innerText = "กำลังบันทึกข้อมูล...";
            btn.disabled = true;

            try {
                await addDoc(collection(db, "bookings"), {
                    name: name,
                    phone: phone,
                    date: date,
                    time: time,
                    passengers: passengers, 
                    details: details || "-",
                    pickup: { lat: pickup.lat, lng: pickup.lng, name: pickupName },
                    destination: { lat: destination.lat, lng: destination.lng, name: destName },
                    timestamp: new Date(),
                    status: "pending" 
                });
                alert("จองคิวสำเร็จ!");
                location.reload(); 
            } catch (e) { 
                alert("เกิดข้อผิดพลาด: " + e.message); 
                btn.innerText = "ยืนยันการจอง";
                btn.disabled = false;
            }
        };
    </script>
</body>
</html>
